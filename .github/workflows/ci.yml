name: CI/CD — Bangalore Transit Digital Twin

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/transit-api

jobs:
  # ── 1. Lint & type-check ────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy data_engineering stream_processing serving_layer --ignore-missing-imports

  # ── 2. Unit & integration tests ─────────────────────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        ports: ["9092:9092"]
        env:
          KAFKA_ZOOKEEPER_CONNECT: ""
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_KRAFT_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml
        env:
          KAFKA_BOOTSTRAP: localhost:9092
          REDIS_URL: redis://localhost:6379
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # ── 3. Build & push Docker image ────────────────────────────────────────────
  build:
    name: Build API image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Trigger model retraining if data pipeline code changes ───────────────
  trigger-retrain:
    name: Trigger ML retraining
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.commits[0].modified, 'mlops_pipeline/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Submit Ray training job
        run: |
          pip install ray[default] mlflow
          python mlops_pipeline/training/submit_training_job.py \
            --experiment-name bangalore-transit-eta \
            --commit-sha ${{ github.sha }}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          RAY_ADDRESS: ${{ secrets.RAY_CLUSTER_ADDRESS }}

  # ── 5. Deploy to GKE (main branch only) ─────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: transit-twin-cluster
          location: asia-south1
      - name: Deploy via Helm
        run: |
          helm upgrade --install transit-api infrastructure/k8s/helm/transit-api \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --namespace transit-twin \
            --create-namespace \
            --wait